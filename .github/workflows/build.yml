name: Build & Release

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v2.0, v2.1, etc.
  workflow_dispatch:  # allow manual runs from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate app icon
        run: python make_icon.py

      - name: Build with PyInstaller
        run: python -m PyInstaller ToddlerKeyboardSmash.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToddlerKeyboardSmash
          path: dist\ToddlerKeyboardSmash.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\ToddlerKeyboardSmash.exe
          generate_release_notes: true
